name: Release Skills

on:
  push:
    branches: [ main ]
    paths:
      - 'wps-office-suite/**'
      - 'zwjh-skill/**'
      - 'dgngjx-skill/**'
      - 'winskill/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed skills
        id: changed
        run: |
          CHANGED=""
          for skill in wps-office-suite zwjh-skill dgngjx-skill winskill; do
            if git diff --name-only HEAD~1..HEAD 2>/dev/null | grep -q "^${skill}/"; then
              CHANGED="${CHANGED} ${skill}"
            fi
          done
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Detected changes in:${CHANGED}"

      - name: Create Release + Update README
        if: steps.changed.outputs.changed != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CHANGED_SKILLS: ${{ steps.changed.outputs.changed }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request
          from datetime import datetime

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          changed_skills = os.environ["CHANGED_SKILLS"].strip().split()

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json"
          }

          # --- Create Releases ---
          for skill in changed_skills:
              sk_path = f"{skill}/SKILL.md"
              with open(sk_path, "r", encoding="utf-8") as f:
                  content = f.read()

              ver_m = re.search(r'^version:\s*(.+)$', content, re.MULTILINE)
              version = ver_m.group(1).strip() if ver_m else "unknown"
              tag = f"{skill}-v{version}"
              desc_m = re.search(r'^description:\s*["\']?(.+?)["\']?\s*$', content, re.MULTILINE)
              desc = desc_m.group(1).strip("'\"") if desc_m else ""
              body = f"## {skill} v{version}\n\n{desc}\n\nSee [SKILL.md](https://github.com/{repo}/blob/main/{sk_path}) for details."

              print(f"Creating release {tag}...")
              payload = json.dumps({
                  "tag_name": tag,
                  "name": f"{skill} v{version}",
                  "body": body,
                  "draft": False,
                  "prerelease": False
              }).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/{repo}/releases",
                  data=payload,
                  headers={**headers, "Content-Type": "application/json"},
                  method="POST"
              )
              try:
                  resp = urllib.request.urlopen(req)
                  print(f"Release created: {json.loads(resp.read())['html_url']}")
              except Exception as e:
                  print(f"Release may already exist or error: {e}")

          # --- Update README ---
          SKILLS = ["wps-office-suite", "zwjh-skill", "dgngjx-skill", "winskill"]
          rows = []
          for s in SKILLS:
              p = f"{s}/SKILL.md"
              with open(p, "r", encoding="utf-8") as f:
                  c = f.read()
              dm = re.search(r'^description:\s*["\']?(.+?)["\']?\s*$', c, re.MULTILINE)
              d = (dm.group(1).strip("'\"") if dm else "")[:120]
              vm = re.search(r'^version:\s*(.+)$', c, re.MULTILINE)
              v = vm.group(1).strip() if vm else "-"
              rows.append(f"| {s} | `{s}/SKILL.md` | v{v} | {d} |")

          new_table = "## 📦 Skill 索引\n\n| 技能 | 路径 | 最新版本 | 描述 |\n|------|------|----------|------|\n" + "\n".join(rows) + "\n"

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          readme = re.sub(
              r'## 📦 Skill 索引\n\n\| 技能 \| 路径 \| 最新版本 \| 描述 \|\n\|------\|------\|----------\|------\|\n(?:\|.+\n)*',
              new_table,
              readme
          )
          now = datetime.now().strftime("%Y-%m-%d %H:%M")
          readme = re.sub(r'\*最后更新：.*\*', f"*最后更新：{now}*", readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)
          print("README updated")
          PYEOF

      - name: Commit and push README
        if: steps.changed.outputs.changed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update README index [skip ci]"
          git push

  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug GITEE_TOKEN
        run: |
          if [ -n "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN is set (length: ${#GITEE_TOKEN})"
            echo "First 4 chars: ${GITEE_TOKEN:0:4}"
          else
            echo "::error::GITEE_TOKEN is NOT set or empty!"
            exit 1
          fi
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Build safe URL (token may contain special chars)
          SAFE_URL="https://fyniujin_admin:${GITEE_TOKEN}@gitee.com/fyniujin_admin/devskill.git"
          git remote add gitee "${SAFE_URL}" 2>/dev/null || git remote set-url gitee "${SAFE_URL}"
          echo "--- Remotes ---"
          git remote -v
          echo "--- Pushing to Gitee ---"
          git push gitee main --force-with-lease 2>&1
          echo "--- Done ---"
