              now = datetime.now().strftime('%Y-%m-%d %H:%M')
              readme = re.sub(r'\*最后更新：\*', '*最后更新：' + now + '*', readme)
              readme = re.sub(r'\*最后更新：.*\*', '*最后更新：' + now + '*', readme)

              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(readme)
              print('README updated successfully')
          except Exception as e:
              print('ERROR updating README: ' + str(e))
              raise
