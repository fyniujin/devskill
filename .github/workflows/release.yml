name: Release Skills

on:
  push:
    branches: [ main ]
    paths:
      - 'wps-office-suite/**'
      - 'zwjh-skill/**'
      - 'dgngjx-skill/**'
      - 'winskill/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed skills
        id: changed
        run: |
          CHANGED=""
          for skill in wps-office-suite zwjh-skill dgngjx-skill winskill; do
            if git diff --name-only HEAD~1..HEAD 2>/dev/null | grep -q "^${skill}/"; then
              CHANGED="${CHANGED} ${skill}"
            fi
          done
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Detected changes in:${CHANGED}"

      - name: Create Release for each skill
        if: steps.changed.outputs.changed != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for skill in ${{ steps.changed.outputs.changed }}; do
            echo "--- Processing skill: ${skill} ---"
            VERSION=$(grep -m1 '^version:' "${skill}/SKILL.md" | sed 's/version: *//')
            TAG="${skill}-v${VERSION}"
            echo "Creating release ${TAG}"
            DESC=$(sed -n '/^description:/p' "${skill}/SKILL.md" | head -1 | sed 's/description:[ ]*//')
            BODY="## ${skill} v${VERSION}

${DESC}

See [SKILL.md](https://github.com/${{ github.repository }}/blob/main/${skill}/SKILL.md) for details."
            curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases" \
              -d "{\"tag_name\":\"${TAG}\",\"name\":\"${skill} v${VERSION}\",\"body\":\"$(echo "$BODY" | sed 's/"/\\"/g')\",\"draft\":false,\"prerelease\":false}" \
              || echo "Release may already exist."
            echo "Done with ${skill}"
          done

      - name: Update README.md index
        if: steps.changed.outputs.changed != ''
        run: |
          python3 << 'PYEOF'
          import re
          from datetime import datetime

          SKILLS = ["wps-office-suite", "zwjh-skill", "dgngjx-skill", "winskill"]

          table_rows = []
          for skill in SKILLS:
              path = f"{skill}/SKILL.md"
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      content = f.read()
              except FileNotFoundError:
                  print(f"WARNING: {path} not found, skipping")
                  continue

              desc_match = re.search(r'^description:\s*["\']?(.+?)["\']?\s*$', content, re.MULTILINE)
              desc = desc_match.group(1).strip("'\"") if desc_match else ""
              if len(desc) > 120:
                  desc = desc[:120] + "..."

              ver_match = re.search(r'^version:\s*(.+)$', content, re.MULTILINE)
              ver = ver_match.group(1).strip() if ver_match else "-"

              table_rows.append(f"| {skill} | `{skill}/SKILL.md` | v{ver} | {desc} |")

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          new_table = "## 📦 Skill 索引\n\n| 技能 | 路径 | 最新版本 | 描述 |\n|------|------|----------|------|\n"
          new_table += "\n".join(table_rows) + "\n"

          readme = re.sub(
              r'## 📦 Skill 索引\n\n\| 技能 \| 路径 \| 最新版本 \| 描述 \|\n\|------\|------\|----------\|------\|\n(?:\|.+\n)*',
              new_table,
              readme
          )

          now = datetime.now().strftime("%Y-%m-%d %H:%M")
          readme = re.sub(r'\*最后更新：.*\*', f"*最后更新：{now}*", readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)
          print("README.md updated successfully")
          PYEOF

      - name: Commit updated README
        if: steps.changed.outputs.changed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update README index [skip ci]"
          git push
