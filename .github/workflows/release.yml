name: Release Skills

on:
  push:
    branches: [ main ]
    paths:
      - 'wps-office-suite/**'
      - 'zwjh-skill/**'
      - 'dgngjx-skill/**'
      - 'winskill/**'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed skills
        id: changed
        run: |
          CHANGED=""
          for skill in wps-office-skill zwjh-skill dgngjx-skill winskill; do
            if git diff --name-only HEAD~1 HEAD | grep -q "^${skill}/" 2>/dev/null || [ ! -f ".last-release-${skill}" ]; then
              CHANGED="${CHANGED} ${skill}"
              touch ".last-release-${skill}"
            fi
          done
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT

      - name: Create Release for each skill
        if: steps.changed.outputs.changed != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for skill in ${{ steps.changed.outputs.changed }}; do
            VERSION=$(grep -m1 '^version:' "${skill}/SKILL.md" | sed 's/version: *//')
            TAG="${skill}-v${VERSION}"
            
            # Delete old release if exists
            gh release delete "$TAG" --yes 2>/dev/null || true
            
            # Create new release
            gh release create "$TAG" \
              --title "${skill} v${VERSION}" \
              --notes "## ${skill} v${VERSION}\n\n$(sed -n '/^description:/p' "${skill}/SKILL.md" | head -1)\n\nSee [SKILL.md](https://github.com/${{ github.repository }}/blob/main/${skill}/SKILL.md) for details." \
              "${skill}/"* \
              --latest=false
          done

      - name: Update README.md
        if: steps.changed.outputs.changed != ''
        run: |
          cat > readme_update.py << 'PYEOF'
          import re, os
          
          SKILLS = ["wps-office-suite", "zwjh-skill", "dgngjx-skill", "winskill"]
          
          table_rows = []
          for skill in SKILL.md:
              path = f"{skill}/SKILL.md"
              with open(path, "r", encoding="utf-8") as f:
                  content = f.read()
              
              name = skill
              desc_match = re.search(r'^description:\s*["\']?(.+?)["\']?\s*$', content, re.MULTILINE)
              desc = desc_match.group(1).strip("'\"") if desc_match else ""
              if len(desc) > 120:
                  desc = desc[:120] + "..."
              
              ver_match = re.search(r'^version:\s*(.+)$', content, re.MULTILINE)
              ver = ver_match.group(1).strip() if ver_match else "-"
              
              table_rows.append(f"| {name} | {skill}/{path} | v{ver} | {desc} |")
          
          # Read README.md
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()
          
          # Replace table
          new_table = "## 📦 Skill 索引\n\n| 技能 | 路径 | 最新版本 | 描述 |\n|------|------|----------|------|\n"
          new_table += "\n".join(table_rows) + "\n"
          
          readme = re.sub(
              r'## 📦 Skill 索引\n\n\| 技能 \| 路径 \| 最新版本 \| 描述 \|\n\|------\|------\|----------\|------\|\n(?:\|.+\n)*',
              new_table,
              readme
          )
          
          # Update last updated date
          from datetime import datetime
          now = datetime.now().strftime("%Y-%m-%d %H:%M")
          readme = re.sub(r'\*最后更新：.*\*', f"*最后更新：{now}*", readme)
          
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)
          print("README.md updated")
          PYEOF
          python readme_update.py

      - name: Commit updated README
        if: steps.changed.outputs.changed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .last-release-*
          git diff --cached --quiet || git commit -m "chore: update README index [skip ci]"
          git push
