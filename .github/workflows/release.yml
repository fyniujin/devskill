          git pull origin main 2>/dev/null || true
          git push gitee main 2>&1 || git push gitee main --force 2>&1, c, re.MULTILINE)
                  dm_unquoted = re.search(r'^description:\s+(.+?)\s*
                  vm = re.search(r'^version:\s*(.+)$', c, re.MULTILINE)
                  v = vm.group(1).strip() if vm else '-'
