name: Release Skills
on:
  push:
    branches: [ main ]
    paths:
      - 'wps-office-suite/**'
      - 'zwjh-skill/**'
      - 'dgngjx-skill/**'
      - 'winskill/**'
      - 'tax-receipt-compliance/**'
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed skills
        id: changed
        run: |
          CHANGED=""
          for skill in wps-office-suite zwjh-skill dgngjx-skill winskill tax-receipt-compliance; do
            if git diff --name-only HEAD~1..HEAD 2>/dev/null | grep -q "^${skill}/"; then
              CHANGED="${CHANGED} ${skill}"
            fi
          done
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Detected changes in:${CHANGED}"
      - name: Create Release + Update README
        if: steps.changed.outputs.changed != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CHANGED_SKILLS: ${{ steps.changed.outputs.changed }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request
          from datetime import datetime

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          changed_skills = os.environ["CHANGED_SKILLS"].strip().split()
          headers = {"Authorization": "token " + token, "Accept": "application/vnd.github.v3+json"}

          for skill in changed_skills:
              sk_path = skill + "/SKILL.md"
              with open(sk_path, "r", encoding="utf-8") as f:
                  content = f.read()
              ver_m = re.search(r'^version:\s*(.+)$', content, re.MULTILINE)
              version = ver_m.group(1).strip() if ver_m else "unknown"
              tag = skill + "-v" + version
              desc_m = re.search(r'^description:\s*["\']?(.+?)["\']?\s*$', content, re.MULTILINE)
              desc = desc_m.group(1).strip("'\"") if desc_m else ""
              body = "## " + skill + " v" + version + "\n\n" + desc + "\n\nSee [SKILL.md](https://github.com/" + repo + "/blob/main/" + sk_path + ") for details."
              print("Creating release " + tag + "...")
              payload = json.dumps({"tag_name": tag, "name": skill + " v" + version, "body": body, "draft": False, "prerelease": False}).encode()
              req = urllib.request.Request("https://api.github.com/" + repo + "/releases", data=payload, headers=dict(headers, **{"Content-Type": "application/json"}), method="POST")
              try:
                  resp = urllib.request.urlopen(req)
                  print("Release created: " + json.loads(resp.read())["html_url"])
              except Exception as e:
                  print("Release may already exist or error: " + str(e))

          # --- Update README ---
          SKILLS = ["wps-office-suite", "zwjh-skill", "dgngjx-skill", "winskill", "tax-receipt-compliance"]
          rows = []
          for s in SKILLS:
              p = s + "/SKILL.md"
              with open(p, "r", encoding="utf-8") as f:
                  c = f.read()
              dm = re.search(r'^description:\s*["\']?(.+?)["\']?\s*$', c, re.MULTILINE)
              d = (dm.group(1).strip("'\"") if dm else "")[:120]
              vm = re.search(r'^version:\s*(.+)$', c, re.MULTILINE)
              v = vm.group(1).strip() if vm else "-"
              rows.append("| " + s + " | `" + s + "/SKILL.md` | v" + v + " | " + d + " |")

          new_table = "## 馃摝 Skill 绱㈠紩\n\n| 鎶€鑳?| 璺緞 | 鏈€鏂扮増鏈?| 鎻忚堪 |\n|------|------|----------|------|\n" + "\n".join(rows) + "\n"

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          readme = re.sub(r'## 馃摝 Skill 绱㈠紩\n\n\| 鎶€鑳?\| 璺緞 \| 鏈€鏂扮増鏈?\| 鎻忚堪 \|\n\|------\|------\|----------\|------\|\n(?:\|.+\n)*', new_table, readme)

          # Update history entries
          for skill in changed_skills:
              sk_path = skill + "/SKILL.md"
              with open(sk_path, "r", encoding="utf-8") as f:
                  c = f.read()
              ver_m = re.search(r'^version:\s*(.+)$', c, re.MULTILINE)
              version = ver_m.group(1).strip() if ver_m else "unknown"
              tag = skill + "-v" + version

              today = datetime.now().strftime("%Y-%m-%d")
              # Find existing history for this skill and add new version row
              pattern = r'(<details>\s*<summary>' + re.escape(skill) + r'.*?</summary>\s*\n\s*\|\s*鐗堟湰\s*\|\s*鏃ユ湡\s*\|\s*鏈鏇存柊\s*\|\n\s*\|[-|]+\|\n)(.*?)(\n</details>)'
              match = re.search(pattern, readme, re.DOTALL)
              if match:
                  existing = match.group(0)
                  # Extract changelog from SKILL.md changelog field
                  with open(sk_path, "r", encoding="utf-8") as f:
                      sk_content = f.read()
                  cl_m = re.search(r'^changelog:\s*(.+)$', sk_content, re.MULTILINE)
                  changelog = cl_m.group(1).strip().strip("'\"") if cl_m else "鏇存柊鍙戝竷"
                  new_row = "| v" + version + " | " + today + " | " + changelog + " |\n"
                  # Insert new row after the header separator
                  new_history = re.sub(
                      r'(\|\s*鐗堟湰\s*\|\s*鏃ユ湡\s*\|\s*鏈鏇存柊\s*\|\n\s*\|[-|]+\|\n)',
                      r'\g<1>' + new_row,
                      existing
                  )
                  readme = readme.replace(existing, new_history)

          now = datetime.now().strftime("%Y-%m-%d %H:%M")
          readme = re.sub(r'\*鏈€鍚庢洿鏂帮細.*\*', "*鏈€鍚庢洿鏂帮細" + now + "*", readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)
          print("README updated (index + history)")
          PYEOF

      - name: Commit and push README
        if: steps.changed.outputs.changed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update README index + history [skip ci]"
          git push

  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SAFE_URL="https://fyniujin_admin:${GITEE_TOKEN}@gitee.com/fyniujin_admin/devskill.git"
          git remote add gitee "${SAFE_URL}" 2>/dev/null || git remote set-url gitee "${SAFE_URL}"
          git push gitee main 2>&1 || git push gitee main --force 2>&1