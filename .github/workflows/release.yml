name: Sync to Gitee
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SAFE_URL="https://fyniujin_admin:${GITEE_TOKEN}@gitee.com/fyniujin_admin/devskill.git"
          git remote add gitee "${SAFE_URL}" 2>/dev/null || git remote set-url gitee "${SAFE_URL}"
          for i in 1 2 3; do
            if git push gitee main 2>/dev/null; then
              echo "gitee push succeeded (attempt $i)"
              break
            fi
            echo "gitee push attempt $i failed, retrying with --force..."
            if git push gitee main --force 2>/dev/null; then
              echo "gitee force-push succeeded (attempt $i)"
              break
            fi
            sleep 5
          done
