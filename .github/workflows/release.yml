name: Release Skills
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed skills (auto-discovery)
        id: changed
        run: |
          CHANGED=""
          for skill_dir in $(find . -maxdepth 2 -name 'SKILL.md' -printf '%P\n' | sed 's|/SKILL.md||' | sort); do
            if git diff --name-only HEAD~1..HEAD 2>/dev/null | grep -q "^{skill_dir}/"; then
              CHANGED="${CHANGED} ${skill_dir}"
            fi
          done
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Detected changes in:${CHANGED}"

      - name: Create Release only (README is managed by tongyifabu.ps1)
        if: steps.changed.outputs.changed != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CHANGED_SKILLS: ${{ steps.changed.outputs.changed }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request

          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['REPO']
          changed_skills = os.environ['CHANGED_SKILLS'].strip().split()
          headers = {'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json'}

          def parse_description(content):
              dm_folded = re.search(r'^description:\s*>\s*\n((?:\s+.+\n?)+)', content, re.MULTILINE)
              if dm_folded:
                  return ' '.join(l.strip() for l in dm_folded.group(1).strip().split('\n'))
              dm_quoted = re.search(r'^description:\s*[\'"]([^\'"]+)[\'"]\s*$', content, re.MULTILINE)
              if dm_quoted:
                  return dm_quoted.group(1)
              dm_unquoted = re.search(r'^description:\s+(.+?)\s*$', content, re.MULTILINE)
              if dm_unquoted:
                  return dm_unquoted.group(1)
              return ''

          for skill in changed_skills:
              sk_path = skill + '/SKILL.md'
              try:
                  with open(sk_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  ver_m = re.search(r'^version:\s*(.+)$', content, re.MULTILINE)
                  version = ver_m.group(1).strip() if ver_m else 'unknown'
                  tag = skill + '-v' + version
                  desc = parse_description(content)
                  body = '## ' + skill + ' v' + version + '\n\n' + desc + '\n\nSee [SKILL.md](https://github.com/' + repo + '/blob/main/' + sk_path + ') for details.'
                  print('Creating release ' + tag + '...')
                  payload = json.dumps({'tag_name': tag, 'name': skill + ' v' + version, 'body': body, 'draft': False, 'prerelease': False}).encode()
                  req = urllib.request.Request('https://api.github.com/repos/' + repo + '/releases', data=payload, headers=dict(headers, **{'Content-Type': 'application/json'}), method='POST')
                  try:
                      resp = urllib.request.urlopen(req)
                      print('Release created: ' + json.loads(resp.read())['html_url'])
                  except Exception as e:
                      print('Release may already exist or error: ' + str(e))
              except Exception as e:
                  print('Error processing ' + skill + ': ' + str(e))
          PYEOF

  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: release
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SAFE_URL="https://fyniujin_admin:${GITEE_TOKEN}@gitee.com/fyniujin_admin/devskill.git"
          git remote add gitee "${SAFE_URL}" 2>/dev/null || git remote set-url gitee "${SAFE_URL}"
          git pull origin main 2>/dev/null || true
          git push gitee main 2>&1 || git push gitee main --force 2>&1