# 修改建议模板库
# 按风险类型分类，提供标准修改范本

templates:
  # ========== 主体风险 ==========
  - id: T001
    risk_type: 主体风险
    scenario: 签约主体不存在或异常
    template: |
      【建议条款】
      甲方保证其为依法设立并有效存续的【企业类型】，具有签署和履行本合同的完全民事行为能力和必要授权。甲方承诺在合同签署前向乙方提供营业执照复印件、法定代表人身份证明文件及授权委托书（如适用）。
      
      【违约责任】
      如甲方违反上述保证，乙方有权单方解除本合同，并要求甲方赔偿因此造成的全部损失。

  - id: T002
    risk_type: 主体风险
    scenario: 个人签约但应为公司行为
    template: |
      【建议条款】
      签约方保证其已获得签署本合同所需的全部授权。如签约方为自然人，其保证已获得所代表的法人或非法人组织的书面授权，并应向对方提供授权委托书原件。

  # ========== 条款风险 ==========
  - id: T003
    risk_type: 条款风险
    scenario: 格式条款未显著标识
    template: |
      【建议条款】
      本合同中的格式条款（特别是免除或加重对方责任的条款）将以加粗、下划线或其他显著方式提示对方注意。双方确认已对上述条款进行充分协商和理解。

  - id: T004
    risk_type: 条款风险
    scenario: 显失公平条款
    template: |
      【建议条款】
      双方确认，本合同系在平等、自愿、公平、诚信的基础上签署，任何条款的解释应以公平原则为准。如本合同任何条款被认定为显失公平，双方应协商修改该条款，以使其符合公平原则。

  - id: T005
    risk_type: 条款风险
    scenario: 条款前后矛盾
    template: |
      【建议条款】
      如本合同不同条款之间存在矛盾或不一致，应以【具体条款】为准。双方确认，在签署本合同前已对全部条款进行审阅和确认。

  - id: T006
    risk_type: 条款风险
    scenario: 模糊表述
    template: |
      【建议条款】
      原条款："【原模糊表述】"
      修改为："【具体、可量化的标准】"
      
      示例：
      - "合理期限" → "三十（30）个工作日"
      - "尽快" → "自收到通知之日起五（5）个工作日内"
      - "适当方式" → "以书面形式（包括电子邮件）"

  - id: T007
    risk_type: 条款风险
    scenario: 关键条款缺失
    template: |
      【建议补充条款】
      双方同意，本合同应补充以下必备条款：
      1. 【条款名称】：【具体内容】
      2. 【条款名称】：【具体内容】
      
      上述补充条款构成本合同不可分割的组成部分。

  # ========== 金额风险 ==========
  - id: T008
    risk_type: 金额风险
    scenario: 金额大小写不一致
    template: |
      【建议条款】
      本合同项下金额为人民币【大写金额】元整（¥【小写金额】元）。如大小写金额不一致，以大写金额为准。

  - id: T009
    risk_type: 金额风险
    scenario: 付款节点与交付不匹配
    template: |
      【建议条款】
      甲方应在乙方完成【具体交付义务】并验收合格后的【X】个工作日内支付相应款项。付款条件应与交付进度相匹配，具体付款节点如下：
      1. 合同签订后【X】个工作日内，支付合同总价的【X】%作为预付款；
      2. 【交付节点】完成并验收合格后，支付合同总价的【X】%；
      3. 质保期满且无质量问题后，支付剩余【X】%。

  - id: T010
    risk_type: 金额风险
    scenario: 质保金比例过高
    template: |
      【建议条款】
      质保金比例为结算总价的【3】%（不超过法定上限），质保期为【X】个月。质保期满且无质量问题后【X】个工作日内无息退还。

  - id: T011
    risk_type: 金额风险
    scenario: 违约金过高
    template: |
      【建议条款】
      违约金标准调整为：每逾期一日，按未付款项的【万分之五】计算，累计不超过未付款项的【30】%。如违约金低于实际损失，守约方有权要求增加至实际损失金额。

  # ========== 履行风险 ==========
  - id: T012
    risk_type: 履行风险
    scenario: 交付标准不明确
    template: |
      【建议条款】
      交付验收标准如下：
      1. 功能标准：【具体功能要求】
      2. 性能标准：【具体性能指标】
      3. 安全标准：【具体安全要求】
      4. 验收测试：【具体测试用例和通过条件】
      
      验收由双方共同进行，验收合格后签署《验收确认书》。

  - id: T013
    risk_type: 履行风险
    scenario: 验收流程缺失
    template: |
      【建议补充条款】
      验收流程：
      1. 乙方应在交付后【X】个工作日内书面通知甲方验收；
      2. 甲方应在收到通知后【X】个工作日内组织验收；
      3. 验收合格的，签署《验收确认书》；
      4. 验收不合格的，甲方应在【X】个工作日内书面提出异议，乙方应在【X】个工作日内完成整改并重新提交验收；
      5. 甲方逾期未组织验收或未提出异议的，视为验收合格。

  - id: T014
    risk_type: 履行风险
    scenario: 保修期短于法定最低
    template: |
      【建议条款】
      保修期为【X】个月（不低于法定最低标准），自验收合格之日起计算。保修期内，乙方应在接到甲方维修通知后【X】小时内响应，【X】个工作日内完成维修。

  - id: T015
    risk_type: 履行风险
    scenario: 付款条件过于苛刻
    template: |
      【建议条款】
      付款条件调整为：
      1. 甲方应在收到合规发票后【X】个工作日内付款；
      2. 不得以非实质性瑕疵为由拒绝或延迟付款；
      3. 逾期付款的，按【标准】支付逾期利息。

  # ========== 争议解决风险 ==========
  - id: T016
    risk_type: 争议解决风险
    scenario: 约定管辖不利于己方
    template: |
      【建议条款】
      因本合同引起的或与本合同有关的任何争议，双方应首先通过友好协商解决。协商不成的，任何一方均可向【甲方/乙方】所在地有管辖权的人民法院提起诉讼。

  - id: T017
    risk_type: 争议解决风险
    scenario: 仲裁机构不存在
    template: |
      【建议条款】
      因本合同引起的或与本合同有关的任何争议，双方应首先通过友好协商解决。协商不成的，提交【真实存在的仲裁机构名称】按照其仲裁规则进行仲裁。仲裁裁决是终局的，对双方均有约束力。

  - id: T018
    risk_type: 争议解决风险
    scenario: 争议解决方式矛盾
    template: |
      【建议条款】
      因本合同引起的或与本合同有关的任何争议，双方应首先通过友好协商解决。协商不成的，任何一方均可向【甲方/乙方】所在地有管辖权的人民法院提起诉讼。
      
      （或选择仲裁方式：协商不成的，提交【仲裁机构】按照其仲裁规则进行仲裁。仲裁裁决是终局的，对双方均有约束力。）

  # ========== 合规风险 ==========
  - id: T019
    risk_type: 合规风险
    scenario: 试用期超过法定上限
    template: |
      【建议条款】
      试用期自【起始日期】起至【终止日期】止，共计【X】个月（不超过法定上限）。试用期工资为转正工资的【80】%以上，且不低于当地最低工资标准。

  - id: T020
    risk_type: 合规风险
    scenario: 竞业限制无经济补偿
    template: |
      【建议条款】
      竞业限制条款：
      1. 竞业限制期限：自劳动合同解除或终止之日起【X】个月（不超过两年）；
      2. 竞业限制范围：【具体范围和地域】；
      3. 经济补偿：甲方在竞业限制期间按月支付乙方经济补偿，补偿标准为乙方离职前十二个月平均工资的【30】%（不低于当地最低工资标准），支付时间为每月【15】日前；
      4. 违约责任：乙方违反竞业限制约定的，应向甲方支付违约金【具体金额或计算方式】。

  - id: T021
    risk_type: 合规风险
    scenario: 社保公积金约定违法
    template: |
      【建议条款】
      甲方依法为乙方缴纳社会保险费和住房公积金，乙方个人承担部分由甲方从乙方工资中代扣代缴。双方不得以任何形式约定不缴或少缴社会保险费和住房公积金。

  - id: T022
    risk_type: 合规风险
    scenario: 低于最低工资标准
    template: |
      【建议条款】
      乙方月工资为人民币【X】元（不低于当地最低工资标准）。工资发放时间为每月【X】日前。

# 通用修改建议
general_suggestions:
  - 所有金额应同时标注大小写
  - 所有日期应明确具体日期或计算方法
  - 所有期限应明确起止时间
  - 所有违约责任应具体可执行
  - 所有争议解决条款应明确唯一方式
  - 涉及法律法规的条款应引用最新有效版本
