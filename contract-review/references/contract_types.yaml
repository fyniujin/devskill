# 合同类型定义和专项检查项

contract_types:
  # ========== 买卖合同 ==========
  - id: sales_contract
    name: 买卖合同
    description: 出卖人转移标的物所有权于买受人，买受人支付价款的合同
    legal_basis: 《民法典》第 595 条
    required_clauses:
      - 标的物名称、数量、质量
      - 价款或报酬
      - 履行期限、地点和方式
      - 包装方式
      - 检验标准和方法
      - 结算方式
      - 违约责任
      - 争议解决
    special_checks:
      - 质量标准是否明确（国标/行标/企标）
      - 交付方式是否明确（送货上门/自提）
      - 风险转移时点是否明确
      - 所有权保留条款是否约定
      - 检验期限是否合理
      - 退货条款是否公平

  # ========== 技术开发合同 ==========
  - id: technology_development_contract
    name: 技术开发合同
    description: 当事人之间就新技术、新产品、新工艺或者新材料及其系统的研究开发所订立的合同
    legal_basis: 《民法典》第 851 条
    required_clauses:
      - 项目名称
      - 标的技术的内容、范围和要求
      - 研究开发计划
      - 研究开发经费或者项目经费
      - 利用研究开发经费购置的设备、器材、资料的财产权属
      - 履行的期限、地点和方式
      - 技术情报和资料的保密
      - 风险责任的承担
      - 技术成果的归属和收益的分成办法
      - 验收标准和方法
      - 价款、报酬或者使用费及其支付方式
      - 违约金或者损失赔偿的计算方法
      - 争议解决的方法
    special_checks:
      - 知识产权归属是否明确
      - 源代码是否交付
      - 技术秘密保护是否充分
      - 技术验收标准是否客观
      - 后续改进成果归属
      - 风险责任承担是否合理

  # ========== 租赁合同 ==========
  - id: lease_contract
    name: 租赁合同
    description: 出租人将租赁物交付承租人使用、收益，承租人支付租金的合同
    legal_basis: 《民法典》第 703 条
    required_clauses:
      - 租赁物名称、数量、用途
      - 租赁期限
      - 租金及其支付期限和方式
      - 租赁物维修
      - 违约责任
      - 争议解决
    special_checks:
      - 租期是否超过 20 年（法定上限）
      - 维修责任是否明确
      - 转租是否允许及条件
      - 提前解约条件是否公平
      - 押金退还条件和期限
      - 房屋用途是否合法
      - 是否涉及违章建筑

  # ========== 劳动合同 ==========
  - id: labor_contract
    name: 劳动合同
    description: 劳动者与用人单位确立劳动关系、明确双方权利和义务的协议
    legal_basis: 《劳动合同法》第 17 条
    required_clauses:
      - 用人单位名称、住所和法定代表人
      - 劳动者姓名、住址和身份证号
      - 劳动合同期限
      - 工作内容和工作地点
      - 工作时间和休息休假
      - 劳动报酬
      - 社会保险
      - 劳动保护、劳动条件和职业危害防护
      - 违约责任
      - 争议解决
    special_checks:
      - 试用期时长是否合规
      - 竞业限制范围、期限、补偿是否合规
      - 社保公积金是否依法缴纳
      - 工资是否低于最低工资标准
      - 解除合同条件是否合法
      - 加班费计算基数是否明确
      - 年休假是否约定

  # ========== 借款合同 ==========
  - id: loan_contract
    name: 借款合同
    description: 借款人向贷款人借款，到期返还借款并支付利息的合同
    legal_basis: 《民法典》第 667 条
    required_clauses:
      - 借款种类
      - 币种
      - 用途
      - 数额
      - 利率
      - 期限
      - 还款方式
      - 违约责任
      - 争议解决
    special_checks:
      - 利率是否超过 LPR 四倍
      - 砍头息是否约定
      - 担保方式是否明确
      - 提前还款是否允许及费用
      - 逾期利率是否合理

  # ========== 融资协议 ==========
  - id: financing_agreement
    name: 融资协议
    description: 创业公司与投资方之间关于股权融资的协议
    legal_basis: 《公司法》《民法典》
    required_clauses:
      - 投资金额和估值
      - 股权比例
      - 交割条件
      - 陈述与保证
      - 保密条款
      - 违约责任
      - 争议解决
    special_checks:
      - 对赌条款（业绩承诺、上市承诺）
      - 反稀释条款
      - 清算优先权
      - 一票否决权范围
      - 领售权/拖售权
      - 回购条款
      - 董事会席位安排
      - 知情权和检查权

  # ========== 服务合同 ==========
  - id: service_contract
    name: 服务合同
    description: 服务提供方接受服务委托方的委托，提供特定服务，服务委托方支付报酬的合同
    legal_basis: 《民法典》第 919 条（委托合同）
    required_clauses:
      - 服务内容和范围
      - 服务标准和质量要求
      - 服务期限
      - 服务费用和支付方式
      - 验收标准
      - 违约责任
      - 争议解决
    special_checks:
      - 服务标准是否可量化
      - 验收标准是否客观
      - 服务变更机制
      - 知识产权归属
      - 保密义务
      - 转包/分包限制

  # ========== 运输合同 ==========
  - id: transport_contract
    name: 运输合同
    description: 承运人将旅客或者货物从起运地点运输到约定地点的协议
    legal_basis: 《民法典》第 809 条
    required_clauses:
      - 托运人/收货人信息
      - 货物名称、性质、重量、数量
      - 运输路线和起运/到达地点
      - 运输费用
      - 包装要求
      - 违约责任
      - 争议解决
    special_checks:
      - 货物保险是否约定
      - 运输风险转移时点
      - 逾期交付责任
      - 货物损毁赔偿标准

  # ========== 仓储合同 ==========
  - id: warehousing_contract
    name: 仓储合同
    description: 保管人储存存货人交付的仓储物，存货人支付仓储费的合同
    legal_basis: 《民法典》第 904 条
    required_clauses:
      - 仓储物名称、数量、质量
      - 储存场所
      - 储存期限
      - 仓储费
      - 违约责任
      - 争议解决
    special_checks:
      - 仓储物保险
      - 保管责任范围
      - 提取仓储物条件
      - 逾期储存费用

  # ========== 委托合同 ==========
  - id: entrustment_contract
    name: 委托合同
    description: 委托人和受托人约定，由受托人处理委托人事务的合同
    legal_basis: 《民法典》第 919 条
    required_clauses:
      - 委托事务
      - 处理事务的权限
      - 委托期限
      - 费用和报酬
      - 违约责任
      - 争议解决
    special_checks:
      - 转委托是否允许
      - 代理权限范围
      - 费用承担方式
      - 报告义务

# 合同类型自动识别关键词
identification_keywords:
  - type: sales_contract
    keywords: ["买卖", "采购", "供货", "销售", "订货", "供应"]
  - type: technology_development_contract
    keywords: ["技术开发", "软件开发", "系统开发", "委托开发", "合作开发"]
  - type: lease_contract
    keywords: ["租赁", "租房", "出租", "承租", "商铺租赁", "厂房租赁"]
  - type: labor_contract
    keywords: ["劳动", "聘用", "雇佣", "劳动合同", "劳务合同"]
  - type: loan_contract
    keywords: ["借款", "贷款", "借贷", "欠款", "还款"]
  - type: financing_agreement
    keywords: ["融资", "投资", "增资", "股权融资", "股东协议", "投资协议"]
  - type: service_contract
    keywords: ["服务", "咨询", "顾问", "代理", "中介"]
  - type: transport_contract
    keywords: ["运输", "物流", "货运", "托运", "承运"]
  - type: warehousing_contract
    keywords: ["仓储", "保管", "储存", "仓库"]
  - type: entrustment_contract
    keywords: ["委托", "代办", "代理", "委托合同"]
