# 模型注册表（国产大模型统一路由）
# 说明：
# - 价格为示例（元 / 每 1M tokens），请以各厂商官方最新定价为准。
# - 新增厂商：只需在此加一段 provider + 一个 adapter（见 scripts/adapters），不动路由逻辑。
# - 字段含义：
#     display       中文名
#     adapter       适配器类型：openai_compat / ernie / spark
#     base_url      API 基址（openai_compat / ernie 用）
#     base_url_openai  文心 Qianfan OpenAI 兼容端点（可选）
#     env_hint      所需环境变量名（仅提示，密钥不进包）
#     default_model 默认模型
#     models[]      name / ctx(上下文窗口 token) / price_in / price_out / reasoner(可选)
#     能力画像（0-10，越大越强，纯本地静态经验值，供 auto 策略打分）：
#       reason_score  推理能力   code_score  代码能力   long_score  长文能力
# - 本文件纯数据，不含任何密钥。

providers:
  deepseek:
    display: DeepSeek
    adapter: openai_compat
    base_url: https://api.deepseek.com
    env_hint: DEEPSEEK_API_KEY
    default_model: deepseek-chat
    models:
      -
        name: deepseek-chat
        ctx: 64000
        price_in: 1
        price_out: 2
        reason_score: 8
        code_score: 9
        long_score: 6
      -
        name: deepseek-reasoner
        ctx: 64000
        price_in: 4
        price_out: 16
        reasoner: true
        reason_score: 10
        code_score: 9
        long_score: 6
